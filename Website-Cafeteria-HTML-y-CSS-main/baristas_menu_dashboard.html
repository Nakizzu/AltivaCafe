
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.db { padding: 1.5rem 0; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.top-bar h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.cart-badge { position: relative; display: inline-flex; align-items: center; gap: 8px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 8px 16px; cursor: pointer; font-size: 14px; color: var(--color-text-primary); }
.cart-badge .dot { position: absolute; top: -6px; right: -6px; background: #D85A30; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
.cart-badge .dot.bump { transform: scale(1.4); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; }
.badge-off { position: absolute; top: 8px; left: 8px; background: #D85A30; color: #fff; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 999px; }
.card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.card-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.stars { display: flex; gap: 2px; }
.star { width: 12px; height: 12px; color: #EF9F27; }
.prices { display: flex; align-items: baseline; gap: 6px; }
.price { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.price-old { font-size: 12px; color: var(--color-text-tertiary); text-decoration: line-through; }
.btn-add { margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 6px; background: #3B6D11; color: #C0DD97; border: none; border-radius: var(--border-radius-md); padding: 9px 0; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.18s, transform 0.12s; width: 100%; font-family: var(--font-sans); }
.btn-add:hover { background: #27500A; }
.btn-add:active { transform: scale(0.97); }
.btn-add.added { background: #639922; }

.cart-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; }
.cart-panel h3 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.cart-empty { text-align: center; padding: 28px 0; color: var(--color-text-tertiary); font-size: 14px; }
.cart-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.cart-item:last-child { border-bottom: none; }
.item-icon { font-size: 26px; width: 36px; text-align: center; }
.item-info { flex: 1; }
.item-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.item-price { font-size: 12px; color: var(--color-text-secondary); }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--color-text-primary); transition: background 0.15s; }
.qty-btn:hover { background: var(--color-background-tertiary); }
.qty-num { font-size: 14px; font-weight: 500; min-width: 18px; text-align: center; color: var(--color-text-primary); }
.cart-footer { margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
.total-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; }
.btn-checkout { width: 100%; background: #D85A30; color: #FAECE7; border: none; border-radius: var(--border-radius-md); padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); transition: background 0.18s; }
.btn-checkout:hover { background: #993C1D; }
.toast-msg { position: fixed; bottom: 20px; right: 20px; background: #27500A; color: #C0DD97; padding: 10px 18px; border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99; }
.toast-msg.show { opacity: 1; }
.layout { display: grid; grid-template-columns: 1fr 260px; gap: 20px; align-items: start; }
@media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }
</style>

<div class="db">
  <div class="top-bar">
    <h2>Menú de Cafés</h2>
    <div class="cart-badge" onclick="toggleCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Carrito
      <span class="dot" id="cart-count" style="display:none">0</span>
    </div>
  </div>

  <div class="layout">
    <div>
      <div class="grid" id="product-grid"></div>
    </div>
    <div class="cart-panel" id="cart-panel">
      <h3>🛒 Tu pedido</h3>
      <div id="cart-body">
        <div class="cart-empty">El carrito está vacío</div>
      </div>
      <div class="cart-footer" id="cart-footer" style="display:none">
        <div class="total-row">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">Proceder al pago</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-msg" id="toast"></div>

<script>
const productos = [
  { id:'cafe-irish', nombre:'Cafe Irish', emoji:'☕', precio:4.60, original:5.30, desc:'-13%', estrellas:4 },
  { id:'cafe-ingles', nombre:'Cafe Inglés', emoji:'🫖', precio:5.70, original:7.30, desc:'-22%', estrellas:3 },
  { id:'cafe-australiano', nombre:'Cafe Australiano', emoji:'🌿', precio:3.20, original:null, desc:null, estrellas:5 },
  { id:'cafe-helado', nombre:'Cafe Helado', emoji:'🧊', precio:5.60, original:null, desc:null, estrellas:4 },
  { id:'cafe-viena', nombre:'Cafe Viena', emoji:'🎵', precio:3.85, original:5.50, desc:'-30%', estrellas:5 },
  { id:'cafe-liqueurs', nombre:'Cafe Liqueurs', emoji:'🍂', precio:5.60, original:null, desc:null, estrellas:4 },
];

let carrito = {};

function estrellasSVG(n) {
  return Array.from({length:5}, (_,i) => `<svg class="star" viewBox="0 0 24 24" fill="${i<n?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('');
}

function renderGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = productos.map(p => `
    <div class="card">
      <div class="card-img" style="background:var(--color-background-secondary)">
        <span style="font-size:48px">${p.emoji}</span>
        ${p.desc ? `<span class="badge-off">${p.desc}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${p.nombre}</div>
        <div class="stars">${estrellasSVG(p.estrellas)}</div>
        <div class="prices">
          <span class="price">$${p.precio.toFixed(2)}</span>
          ${p.original ? `<span class="price-old">$${p.original.toFixed(2)}</span>` : ''}
        </div>
        <button class="btn-add" id="btn-${p.id}" onclick="agregar('${p.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar
        </button>
      </div>
    </div>
  `).join('');
}

function agregar(id) {
  const p = productos.find(x => x.id === id);
  if (!p) return;
  if (carrito[id]) {
    carrito[id].cantidad++;
  } else {
    carrito[id] = { ...p, cantidad: 1 };
  }
  updateContador();
  renderCarrito();
  flashBtn(id, p.nombre);
}

function flashBtn(id, nombre) {
  const btn = document.getElementById('btn-' + id);
  if (!btn) return;
  btn.classList.add('added');
  btn.textContent = '✓ Añadido';
  setTimeout(() => {
    btn.classList.remove('added');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Agregar';
  }, 1200);
  showToast('"' + nombre + '" añadido al carrito');
}

function cambiarQty(id, delta) {
  if (!carrito[id]) return;
  carrito[id].cantidad += delta;
  if (carrito[id].cantidad <= 0) delete carrito[id];
  updateContador();
  renderCarrito();
}

function renderCarrito() {
  const body = document.getElementById('cart-body');
  const footer = document.getElementById('cart-footer');
  const items = Object.values(carrito);
  if (items.length === 0) {
    body.innerHTML = '<div class="cart-empty">El carrito está vacío</div>';
    footer.style.display = 'none';
    return;
  }
  body.innerHTML = items.map(item => `
    <div class="cart-item">
      <span class="item-icon">${item.emoji}</span>
      <div class="item-info">
        <div class="item-name">${item.nombre}</div>
        <div class="item-price">$${item.precio.toFixed(2)} c/u</div>
      </div>
      <div class="qty-ctrl">
        <span class="qty-btn" onclick="cambiarQty('${item.id}', -1)">−</span>
        <span class="qty-num">${item.cantidad}</span>
        <span class="qty-btn" onclick="cambiarQty('${item.id}', 1)">+</span>
      </div>
    </div>
  `).join('');
  const total = items.reduce((s, i) => s + i.precio * i.cantidad, 0);
  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
  footer.style.display = 'block';
}

function updateContador() {
  const total = Object.values(carrito).reduce((s, i) => s + i.cantidad, 0);
  const dot = document.getElementById('cart-count');
  dot.textContent = total;
  dot.style.display = total > 0 ? 'flex' : 'none';
  dot.classList.add('bump');
  setTimeout(() => dot.classList.remove('bump'), 250);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function checkout() {
  const items = Object.values(carrito);
  const cant = items.reduce((s,i) => s + i.cantidad, 0);
  const total = items.reduce((s,i) => s + i.precio * i.cantidad, 0);
  showToast('¡Pedido de ' + cant + ' producto(s) por $' + total.toFixed(2) + ' confirmado!');
  carrito = {};
  updateContador();
  renderCarrito();
}

renderGrid();
</script>
